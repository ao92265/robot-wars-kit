<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Robot Wars — Harris All Hands Workshop</title>
<style>
  :root { --bg:#05070d; --panel:#0d1320e6; --ink:#e8eef7; --dim:#7e8aa0; --accent:#3fd0c9; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg); color:var(--ink);
              font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
  #wrap { display:flex; flex-direction:column; height:100vh; }
  header { display:flex; align-items:center; gap:12px; padding:10px 18px; background:var(--panel);
           border-bottom:1px solid #1f2a3d; z-index:5; backdrop-filter: blur(6px); }
  header h1 { font-size:17px; margin:0; letter-spacing:1px; font-weight:800; }
  header .spacer { flex:1; }
  button, label.file { background:#1d2740; color:var(--ink); border:1px solid #2c3a58;
           padding:8px 13px; border-radius:8px; cursor:pointer; font-size:13px; white-space:nowrap; }
  button:hover, label.file:hover { background:#26334f; }
  button[aria-pressed="true"] { border-color:var(--accent); color:var(--accent); }
  input[type=range] { vertical-align:middle; width:120px; }
  input[type=file] { display:none; }
  #stage { flex:1; position:relative; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }
  #hud { position:absolute; top:14px; left:18px; font-variant-numeric:tabular-nums; color:var(--dim);
         font-size:14px; text-shadow:0 1px 4px #000; pointer-events:none; }
  #hint { color:var(--dim); font-size:12px; }
  #banner { position:absolute; inset:0; display:none; flex-direction:column; align-items:center;
            justify-content:center; background:#03050ac4; text-align:center; pointer-events:none; }
  #banner.show { display:flex; }
  #banner .who { font-size:68px; font-weight:900; color:var(--accent);
                 text-shadow:0 0 40px #3fd0c9aa, 0 4px 10px #000; letter-spacing:1px; }
  #banner .sub { font-size:19px; color:var(--dim); margin-top:10px; }
  header .tag { font-size:11px; color:var(--dim); letter-spacing:2px; text-transform:uppercase;
                border-left:1px solid #2c3a58; padding-left:12px; }
  /* cinematic vignette */
  #vignette { position:absolute; inset:0; pointer-events:none; z-index:3;
              box-shadow: inset 0 0 240px 40px #000a, inset 0 0 80px 0 #0006; }
  /* live scoreboard (top-right) */
  #scoreboard { position:absolute; top:14px; right:16px; width:248px; display:flex; flex-direction:column;
                gap:5px; z-index:4; pointer-events:none; }
  .sb-row { display:flex; align-items:center; gap:7px; background:#0b1120cc; border:1px solid #1d2740;
            border-radius:7px; padding:5px 8px; font-size:12px; backdrop-filter:blur(4px); transition:opacity .3s; }
  .sb-row.dead { opacity:.4; filter:grayscale(1); }
  .sb-chip { width:10px; height:10px; border-radius:3px; flex:0 0 auto; box-shadow:0 0 8px currentColor; }
  .sb-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; }
  .sb-bar { flex:0 0 60px; height:7px; background:#1b2436; border-radius:4px; overflow:hidden; }
  .sb-bar i { display:block; height:100%; width:100%; background:#6bcb77; transition:width .15s, background .3s; }
  .sb-ammo { flex:0 0 auto; color:var(--dim); font-variant-numeric:tabular-nums; font-size:11px; }
  /* team header (1v1 team matches): names + colours the side, groups its bots */
  .sb-team { display:flex; align-items:center; gap:7px; margin-top:8px; padding:3px 8px 3px 6px;
             border-left:3px solid var(--tc); border-radius:3px; background:#0b1120aa;
             text-transform:uppercase; letter-spacing:1.5px; font-weight:800; font-size:12px; }
  .sb-team:first-child { margin-top:0; }
  .sb-team.out { opacity:.45; filter:grayscale(1); }
  .sb-tdot { width:11px; height:11px; border-radius:50%; flex:0 0 auto; box-shadow:0 0 10px currentColor; }
  .sb-tname { flex:1; color:#eaf0fa; }
  .sb-tcount { flex:0 0 auto; color:var(--tc); font-variant-numeric:tabular-nums; }
  #scoreboard.teams .sb-row { margin-left:10px; }
  /* kill feed (bottom-right) */
  #killfeed { position:absolute; bottom:16px; right:16px; display:flex; flex-direction:column; gap:5px;
              align-items:flex-end; z-index:4; pointer-events:none; }
  .kf { background:#2a0a10dd; border:1px solid #5a1a24; color:#ff8a99; font-weight:700; font-size:13px;
        letter-spacing:1px; padding:6px 12px; border-radius:7px; opacity:0; transform:translateX(20px);
        transition:opacity .3s, transform .3s; box-shadow:0 0 18px #ff334455; }
  .kf.fade { opacity:1; transform:none; }
  #scoreboard { width:272px; }
  .sb-dmg { flex:0 0 auto; color:#ffd36b; font-variant-numeric:tabular-nums; font-size:11px; min-width:26px; text-align:right; }
  /* round timer (top-center) */
  #timer { position:absolute; top:12px; left:50%; transform:translateX(-50%); z-index:4; pointer-events:none;
           font-variant-numeric:tabular-nums; font-size:22px; font-weight:800; letter-spacing:2px; color:#e8eef7;
           background:#0b1120cc; border:1px solid #1d2740; border-radius:9px; padding:5px 16px;
           text-shadow:0 0 12px #000; backdrop-filter:blur(4px); }
  #weather { position:absolute; top:54px; left:50%; transform:translateX(-50%); z-index:4; pointer-events:none;
             font-size:13px; font-weight:800; letter-spacing:3px; color:#cfe0ff;
             background:#0b1120cc; border:1px solid #1d2740; border-radius:7px; padding:3px 12px;
             backdrop-filter:blur(4px); display:none; }
  /* commentary ticker (bottom-center) */
  #ticker { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); z-index:4; pointer-events:none;
            display:flex; flex-direction:column; align-items:center; gap:5px; }
  .tk { background:#0b1120dd; border:1px solid #2c3a58; color:#cdd7e8; font-size:13px; font-weight:600;
        letter-spacing:.5px; padding:6px 14px; border-radius:20px; opacity:0; transform:translateY(12px);
        transition:opacity .3s, transform .3s; }
  .tk.show { opacity:1; transform:none; }
  /* FIGHT! stinger */
  #stinger { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:6;
             pointer-events:none; font-size:120px; font-weight:900; letter-spacing:6px; color:#fff;
             text-shadow:0 0 50px #3fd0c9, 0 0 90px #3fd0c9aa; opacity:0; }
  #stinger.go { animation:stingerPop 1.1s ease-out forwards; }
  @keyframes stingerPop { 0%{opacity:0; transform:scale(2.4)} 18%{opacity:1; transform:scale(1)}
                          70%{opacity:1; transform:scale(1.04)} 100%{opacity:0; transform:scale(1.15)} }
  /* intro title card */
  #titlecard { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center;
               justify-content:center; z-index:6; pointer-events:none; opacity:0; transition:opacity .5s;
               background:radial-gradient(ellipse at center, #03050a88, #03050aee); }
  #titlecard.show { opacity:1; }
  #titlecard .tc-title { font-size:76px; font-weight:900; letter-spacing:4px; color:#3fd0c9;
                         text-shadow:0 0 50px #3fd0c9aa, 0 6px 14px #000; }
  #titlecard .tc-tag { font-size:18px; letter-spacing:6px; text-transform:uppercase; color:#e8eef7; margin-top:4px; }
  #titlecard .tc-sub { font-size:16px; color:#7e8aa0; margin-top:14px; letter-spacing:1px; }
  /* cinematic letterbox + screen flash */
  #letterbox { position:absolute; inset:0; z-index:5; pointer-events:none; }
  #letterbox::before, #letterbox::after { content:""; position:absolute; left:0; right:0; height:0; background:#000;
        transition:height .4s ease; }
  #letterbox::before { top:0; } #letterbox::after { bottom:0; }
  #letterbox.show::before, #letterbox.show::after { height:11vh; }
  #flash { position:absolute; inset:0; z-index:7; pointer-events:none; background:#fff; opacity:0; }
  #banner.show .who { animation:winnerPop .7s ease-out; }
  @keyframes winnerPop { 0%{transform:scale(.3); opacity:0} 60%{transform:scale(1.12)} 100%{transform:scale(1); opacity:1} }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>🤖 ROBOT WARS</h1>
    <span class="tag">Harris All Hands Workshop</span>
    <label class="file">Load match<input id="file" type="file" accept=".jsonl,.json,.txt"></label>
    <button id="play">▶ Play</button>
    <button id="restart">⟲ Restart</button>
    <button id="autocam" aria-pressed="true">🎥 Auto-cam</button>
    <button id="voice" aria-pressed="false">🔇 Voice</button>
    <button id="music" aria-pressed="false">🔇 Music</button>
    <span class="spacer"></span>
    <span id="hint">drop a <b>.jsonl</b> here · drag to orbit · scroll to zoom</span>
    speed <input id="speed" type="range" min="10" max="60" value="18">
  </header>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="vignette"></div>
    <div id="letterbox"></div>
    <div id="hud"></div>
    <div id="timer">⏱ 00:00</div>
    <div id="weather"></div>
    <div id="scoreboard"></div>
    <div id="killfeed"></div>
    <div id="ticker"></div>
    <div id="stinger"></div>
    <div id="titlecard">
      <div class="tc-title">ROBOT WARS</div>
      <div class="tc-tag">Harris All Hands Workshop</div>
      <div class="tc-sub"></div>
    </div>
    <div id="flash"></div>
    <div id="banner"><div class="who"></div><div class="sub"></div></div>
  </div>
</div>
<!--THREE--><!--MATCH--><!--VOICE--><!--APP--></body>
</html>
